# Add this at the top level (outside server {})
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8081;
    server_name _;

    location / {
        proxy_pass http://headlamp.vplatform.local;
        proxy_set_header Host headlamp.vplatform.local;
        
        # Identity headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket headers - The "Clean" way
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade; # Uses the map above

        # Timeouts for logs
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off; # Disable buffering so logs stream instantly
    }
}