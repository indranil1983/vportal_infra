apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp
  namespace: headlamp
  annotations:
    # Forces NGINX to handle this (replaces Contour)
    kubernetes.io/ingress.class: nginx
    # Prevents automatic HTTPS redirect (useful for local testing)
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: headlamp.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: headlamp
            port:
              number: 80 # MUST match the 'port' in the Service YAML above