apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: vplatform-pool
  namespace: metallb-system # This will be replaced by $METALLB_NAMESPACE
spec:
  addresses:
  - 192.168.122.200-192.168.122.250 # This will be replaced by $METALLB_IP_RANGE
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-advertisement
  namespace: metallb-system # This will be replaced by $METALLB_NAMESPACE
spec:
  ipAddressPools:
  - vplatform-pool